<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Workspace</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --nav-bg: #002147;
            --nav-text: #FFFFFF;
            --primary-blue: #0052CC;
            --bg-body: #FFFFFF;
            --text-main: #172B4D;
            --max-width: 1080px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
        }

        .navbar {
            background-color: var(--nav-bg);
            height: 56px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-inner {
            width: 100%;
            max-width: var(--max-width);
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .navbar-brand {
            color: var(--nav-text);
            text-decoration: none;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links { margin-left: 32px; display: flex; gap: 20px; }
        .nav-link-item { color: rgba(255, 255, 255, 0.85); text-decoration: none; font-size: 0.9rem; }

        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }

        .mypage-btn {
                color: rgba(255, 255, 255, 0.9);
                text-decoration: none;
                font-size: 0.85rem;
                font-weight: 500;
                padding: 6px 12px;
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 4px;
                transition: all 0.2s;
            }
            
            .mypage-btn:hover {
                background: rgba(255, 255, 255, 0.1);
                color: #FFFFFF;
                border-color: #FFFFFF;
            }

        .main-layout { display: flex; justify-content: center; min-height: calc(100vh - 150px); }
        .content-container { width: 100%; max-width: var(--max-width); padding: 60px 40px; }

        footer {
            max-width: var(--max-width);
            margin: 40px auto 0;
            padding: 40px;
            border-top: 1px solid #DFE1E6;
            text-align: center;
            color: #6B778C;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="{% url 'post_list' %}" class="navbar-brand">
                <i class="fa-solid fa-layer-group"></i> WIKI WORKSPACE
            </a>
            
            <div class="nav-links">
                <a href="{% url 'post_list' %}" class="nav-link-item">최근 문서</a>
            </div>

            <div class="nav-right">
                {% if user.is_authenticated %}
                    <a href="/accounts/profile/" class="mypage-btn">
                        <i class="fa-regular fa-circle-user"></i> 마이페이지
                    </a>
                {% else %}
                    <a href="/admin/" class="nav-link-item">로그인</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="main-layout">
        <main class="content-container">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <footer>
        &copy; 2026 Wiki Workspace
    </footer>

</body>
</html>
