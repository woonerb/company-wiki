<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Workspace - Editor</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --nav-bg: #002147;
            --sidebar-bg: #F4F5F7;
            --primary-blue: #0052CC;
            --border-color: #DFE1E6;
        }

        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; color: #172B4D; display: flex; flex-direction: column; height: 100vh; }

        /* 레이아웃 & 네비게이션 생략 (기존 스타일 유지) */
        .navbar { background-color: var(--nav-bg); height: 50px; display: flex; align-items: center; padding: 0 20px; color: white; }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); overflow-y: auto; }
        .main-content { flex: 1; overflow-y: auto; background: white; }
        .content-inner { max-width: 900px; margin: 0 auto; padding: 40px 50px; animation: fadeIn 0.4s; }

        /* 폼 공통 스타일 */
        .form-group { margin-bottom: 25px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 0.95rem; }
        .form-control { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 6px; font-size: 1rem; box-sizing: border-box; }

        /* --- 해시태그 전용 스타일 --- */
        .tag-container {
            display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;
            border: 2px solid var(--border-color); border-radius: 6px; background: #fff;
        }
        .tag-item {
            background: #EBECF0; color: #42526E; padding: 4px 10px; border-radius: 4px;
            display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 500;
        }
        .tag-item i { cursor: pointer; color: #6B778C; font-size: 0.75rem; }
        .tag-item i:hover { color: #eb5757; }
        .tag-input { border: none; outline: none; flex: 1; min-width: 150px; font-size: 0.9rem; }

        .recommend-btn {
            background: #EAE6FF; color: #403294; border: 1px solid #C0B6F2;
            padding: 6px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: 0.2s; margin-top: 8px; display: inline-flex; align-items: center; gap: 5px;
        }
        .recommend-btn:hover { background: #C0B6F2; }
        /* ----------------------- */

        #editor-container { height: 450px; border-radius: 0 0 6px 6px; }
        .btn-save { background: var(--primary-blue); color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'post_list' %}" class="navbar-brand"><i class="fa-solid fa-layer-group"></i> WIKI Workspace</a>
    </nav>

    <div class="app-container">
        <aside class="sidebar">
            </aside>

        <main class="main-content">
            <div class="content-inner">
                <h2 style="margin-top: 0;">📄 문서 편집기</h2>
                
                <form method="POST" id="post-form">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label class="form-label">게시판</label>
                        <select name="node" class="form-control" required>
                            {% for node in nodes %}
                                <option value="{{ node.id }}" {% if post.node.id == node.id %}selected{% endif %}>{{ node.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">제목</label>
                        <input type="text" name="title" id="post-title" class="form-control" value="{{ post.title|default:'' }}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">해시태그</label>
                        <div class="tag-container" id="tag-box">
                            {% for tag in post.tags.all %}
                                <div class="tag-item" data-tag="{{ tag.name }}">
                                    #{{ tag.name }} <i class="fa-solid fa-xmark" onclick="removeTag(this)"></i>
                                </div>
                            {% endfor %}
                            <input type="text" class="tag-input" id="tag-input" placeholder="태그 입력 후 Enter (쉼표 구분 가능)">
                        </div>
                        <input type="hidden" name="tags" id="hidden-tags-input">
                        
                        <button type="button" class="recommend-btn" id="ai-recommend-btn">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> AI 해시태그 추천받기
                        </button>
                    </div>

                    <div class="form-group">
                        <label class="form-label">본문</label>
                        <div id="editor-container">{{ post.content|safe|default:'' }}</div>
                        <input type="hidden" name="content" id="id_content">
                    </div>

                    <div style="text-align: right; margin-top: 30px;">
                        <button type="button" class="btn-save" style="background:#666; margin-right:5px;" onclick="history.back()">취소</button>
                        <button type="submit" class="btn-save">문서 저장하기</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // 1. Quill 초기화
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: { toolbar: [[{'header':[1,2,false]}], ['bold','italic','underline'], ['link','image','code-block'], [{'list':'ordered'},{'list':'bullet'}]] }
        });

        // 2. 해시태그 로직
        const tagInput = document.getElementById('tag-input');
        const tagBox = document.getElementById('tag-box');
        let tags = [];

        // 기존 태그 초기화
        document.querySelectorAll('.tag-item').forEach(item => {
            tags.push(item.getAttribute('data-tag'));
        });

        function addTag(tagName) {
            tagName = tagName.replace(/[#\s,]/g, ""); // 불필요한 문자 제거
            if (tagName && !tags.includes(tagName)) {
                tags.push(tagName);
                const tagEl = document.createElement('div');
                tagEl.className = 'tag-item';
                tagEl.setAttribute('data-tag', tagName);
                tagEl.innerHTML = `#${tagName} <i class="fa-solid fa-xmark" onclick="removeTag(this)"></i>`;
                tagBox.insertBefore(tagEl, tagInput);
            }
            tagInput.value = "";
        }

        function removeTag(el) {
            const tagItem = el.parentElement;
            const tagName = tagItem.getAttribute('data-tag');
            tags = tags.filter(t => t !== tagName);
            tagItem.remove();
        }

        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                addTag(tagInput.value);
            }
        });

        // 3. AI 해시태그 추천 연동 (API 호출)
        document.getElementById('ai-recommend-btn').addEventListener('click', async () => {
            const title = document.getElementById('post-title').value;
            const content = quill.getText();

            if (!content.trim()) {
                Swal.fire('알림', '본문 내용을 먼저 입력해야 추천이 가능합니다.', 'info');
                return;
            }

            // 버튼 로딩 상태
            const btn = document.getElementById('ai-recommend-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 분석 중...';
            btn.disabled = true;

            try {
                // 해쉬태그 의 추천 API 호출
                const response = await fetch("{% url 'suggest_tags' %}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
                    body: JSON.stringify({ title: title, content: content })
                });
                
                const data = await response.json();
                
                if (data.tags && data.tags.length > 0) {
                    data.tags.forEach(tag => addTag(tag));
                    Swal.fire({ icon: 'success', title: '추천 완료', text: 'AI가 관련 태그를 찾아 추가했습니다!', timer: 1500 });
                } else {
                    Swal.fire('알림', '추천할 만한 태그를 찾지 못했습니다.', 'info');
                }
            } catch (err) {
                console.error(err);
                Swal.fire('에러', '추천 서버와 통신 중 오류가 발생했습니다.', 'error');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        });

        // 4. 폼 전송 시 데이터 취합
        document.getElementById('post-form').onsubmit = function() {
            document.getElementById('id_content').value = quill.root.innerHTML;
            document.getElementById('hidden-tags-input').value = JSON.stringify(tags);
            return true;
        };
    </script>
</body>
</html>
