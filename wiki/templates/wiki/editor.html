{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 900px; margin-top: 50px;">
    <form action="{% url 'post_create' %}" method="POST" id="wiki-form">
        {% csrf_token %}
        <input type="text" name="title" id="title" placeholder="제목을 입력하세요" 
               style="width: 100%; padding: 15px; font-size: 1.5rem; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 20px;">
        
        <div class="editor-toolbar" style="background: #f8f9fa; padding: 10px; border: 1px solid #ddd; border-bottom: none;">
            <button type="button" onclick="editor.chain().focus().toggleBold().run()"><b>B</b></button>
            <button type="button" onclick="editor.chain().focus().toggleItalic().run()"><i>I</i></button>
            <button type="button" onclick="editor.chain().focus().setHeading({ level: 1 }).run()">H1</button>
            <input type="color" oninput="editor.chain().focus().setColor(this.value).run()">
        </div>

        <div id="editor" style="border: 1px solid #ddd; min-height: 400px; padding: 20px; background: white;"></div>
        
        <input type="hidden" name="content" id="hidden-content">
        
        <button type="submit" style="margin-top: 20px; padding: 12px 30px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; float: right;">
            지식 등록하기
        </button>

        {% csrf_token %}
        <div class="file-upload-section" style="margin-top: 20px; padding: 15px; border: 1px dashed #ccc;">
            <label>📎 관련 매뉴얼/파일 첨부:</label>
            <input type="file" name="attachment" class="form-control">
        </div>

        <button type="submit" class="btn btn-success mt-3 float-right">지식 등록하기</button>

    </form>
</div>

<script src="https://unpkg.com/@tiptap/standalone"></script>
<script>
    const { Editor } = Tiptap;
    const editor = new Editor({
        element: document.querySelector('#editor'),
        extensions: [Tiptap.StarterKit, Tiptap.Color, Tiptap.TextStyle],
        content: '<p>업무 노하우를 여기에 기록하세요...</p>',
    });

    // 폼 제출 시 에디터 내용을 hidden input에 담기
    document.getElementById('wiki-form').onsubmit = function() {
        document.getElementById('hidden-content').value = editor.getHTML();
    };
</script>
{% endblock %}
