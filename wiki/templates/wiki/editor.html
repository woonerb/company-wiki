{% extends "base.html" %}
{% block content %}

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<div class="container" style="max-width: 900px; margin: 50px auto;">
    <form action="{% url 'post_create' %}" method="POST" id="wiki-form" enctype="multipart/form-data">
        {% csrf_token %}
        
        <input type="text" name="title" id="title" placeholder="제목을 입력하세요" required
               style="width: 100%; padding: 15px; font-size: 1.5rem; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 20px;">
        
        <div id="editor-container" style="height: 400px; background: white;"></div>
        
        <input type="hidden" name="content" id="hidden-content">

        <div class="file-upload-section" style="margin-top: 20px; padding: 15px; border: 1px dashed #ccc; background: #fafafa; border-radius: 5px;">
            <label style="font-weight: bold; display: block; margin-bottom: 10px;">📎 관련 매뉴얼/파일 첨부:</label>
            <input type="file" name="attachment" class="form-control" style="width: 100%;">
        </div>

        <button type="submit" style="margin-top: 20px; padding: 12px 40px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; float: right; font-weight: bold;">
            지식 등록하기
        </button>
    </form>
</div>

<script>
    // 2. 에디터 초기화
    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: [
                [{ 'header': [1, 2, false] }],
                ['bold', 'italic', 'underline'],
                ['image', 'code-block', 'link'],
                [{ 'color': [] }, { 'background': [] }],          
                [{ 'list': 'ordered'}, { 'list': 'bullet' }]
            ]
        },
        placeholder: '업무 노하우를 여기에 기록하세요...',
        theme: 'snow'
    });

    // 3. 이미지 붙여넣기 처리 (이미지 복사 후 Ctrl+V 대응)
    quill.root.addEventListener('paste', function (e) {
        if (e.clipboardData && e.clipboardData.files && e.clipboardData.files.length) {
            e.preventDefault();
            [].forEach.call(e.clipboardData.files, function(file) {
                if (file.type.match(/^image\//)) {
                    uploadImageToServer(file);
                }
            });
        }
    });

    // 4. 서버로 이미지 업로드 함수
    async function uploadImageToServer(file) {
        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch('/upload-image/', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                }
            });
            const data = await response.json();
            if (data.url) {
                // 현재 커서 위치에 이미지 삽입
                const range = quill.getSelection();
                quill.insertEmbed(range.index, 'image', data.url);
            }
        } catch (error) {
            console.error("이미지 업로드 실패:", error);
        }
    }

    // 5. 폼 전송 시 Quill의 HTML 내용을 hidden 필드에 복사
    var form = document.getElementById('wiki-form');
    form.onsubmit = function() {
        var content = document.querySelector('input[name=content]');
        content.value = quill.root.innerHTML;
        
        if (content.value === '<p><br></p>' || !content.value) {
            alert("내용을 입력해주세요.");
            return false;
        }
    };
</script>

{% endblock %}
